[ollama]
# URL of the local Ollama server
local_url = http://localhost:11434

# ---------------------------------------------------------------
# Local models to pull during Docker build (comma-separated)
# ---------------------------------------------------------------
# Leave empty or comment out to skip local model installation.
# The test script will automatically use the smallest installed model.
local_models = gemma2:2b

# ---------------------------------------------------------------
# Cloud configuration (optional)
# ---------------------------------------------------------------
# For direct cloud API usage via ollama.com:
#   1. Create an account at https://ollama.com
#   2. Generate an API key at https://ollama.com/settings/keys
#   3. Enter it here:
#
#cloud_api_key = REPLACE_WITH_YOUR_KEY
#cloud_url = https://ollama.com
#cloud_model = minimax-m2.5:cloud

[test]
# Prompt for the test
prompt = What is 2+2? Answer in one short sentence.
# Timeout in seconds for the model response
timeout = 120
